AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for VegaWebAWS team members
Parameters:
  Environment: # this is the environment name for the table.
    Type: String
    Default: dev
    Description: The deployment environment

Resources:
  TeamMembersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub team-members-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

Outputs:
  TeamMembersTableName:
    Value: !Ref TeamMembersTable
    Export:
      Name: !Sub "vega-team-members-table-name-${Environment}"
  TeamMembersTableArn:
    Value: !GetAtt TeamMembersTable.Arn
    Export:
      Name: !Sub "vega-team-members-table-arn-${Environment}"