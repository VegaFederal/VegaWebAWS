AWSTemplateFormatVersion: '2010-09-09'
Description: Deploying vega website

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: The deployment environment

  TemplateBucket:
    Type: String
    Description: S3 bucket containing CloudFormation templates

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-03de7ad5a4c7c1822
    Description: ID of the existing company VPC

  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (e.g., example.com)

  WwwDomain:
    Type: String
    Default: ""
    Description: WWW subdomain (e.g., www.vegafederal.com)

  CertificateArn:
    Type: String
    Default: ""
    Description: ACM Certificate ARN for HTTPS

  CreateHostedZone:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Create Route 53 hosted zone for domain

Conditions:
  HasVpcConfig: !Not [!Equals [!Ref VpcId, '']]

Resources:
  # Security Groups Stack
  SecurityGroupsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplateBucket}.s3.amazonaws.com/templates/security-groups.yaml
      Parameters:
        Environment: !Ref Environment
        VpcId: !Ref VpcId
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Static Website Stack
  StaticWebsiteStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplateBucket}.s3.amazonaws.com/templates/static-website.yaml
      Parameters:
        Environment: !Ref Environment
        DomainName: !Ref DomainName
        WwwDomain: !Ref WwwDomain
        CertificateArn: !Ref CertificateArn
        CreateHostedZone: !Ref CreateHostedZone
      Tags:
        - Key: Environment
          Value: !Ref Environment



Outputs:
  # Your outputs will go here

  WebServerSecurityGroupId:
    Condition: HasVpcConfig
    Description: Security Group ID for web servers
    Value: !GetAtt SecurityGroupsStack.Outputs.WebServerSecurityGroupId
    Export:
      Name: !Sub ${AWS::StackName}-WebServerSecurityGroupId

  WebsiteBucketName:
    Description: S3 Bucket for website content
    Value: !GetAtt StaticWebsiteStack.Outputs.WebsiteBucketName
    Export:
      Name: !Sub ${AWS::StackName}-WebsiteBucketName

  WebsiteURL:
    Description: S3 Bucket for website content
    Value: !GetAtt StaticWebsiteStack.Outputs.CloudFrontDistributionDomainName

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !GetAtt StaticWebsiteStack.Outputs.CloudFrontDistributionId

  CloudFrontLogsBucketName:
    Description: S3 Bucket for CloudFront logs
    Value: !GetAtt StaticWebsiteStack.Outputs.CloudFrontLogsBucketName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontLogsBucketName
